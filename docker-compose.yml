version: "3.8"

services:
  galloway-os:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: galloway-os
    restart: unless-stopped
    ports:
      - "${PORT:-7432}:7432"
    environment:
      - PORT=7432
      - NODE_ENV=production
      # Explicitly route the SQLite DB strictly to the mounted volume per Phase 16 specs
      - DATABASE_PATH=/app/src/db/galloway-os.sqlite
      - LOG_LEVEL=info
    volumes:
      # Mount explicitly strictly to src/db for complete architectural data isolation
      - ./src/db:/app/src/db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7432/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

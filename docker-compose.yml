version: "3.8"

services:
  galloway-os:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: galloway-os
    restart: unless-stopped
    ports:
      - "${PORT:-7432}:7432"
    environment:
      - PORT=7432
      - NODE_ENV=production
      - DATABASE_PATH=./data/galloway-os.sqlite
      - LOG_LEVEL=info
    volumes:
      # Persistent SQLite database on host filesystem
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7432/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

services:
  galloway-os:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: galloway-os
    restart: unless-stopped
    ports:
      - "7432:7432"
    env_file:
      - .env.production
    volumes:
      # Mount explicitly strictly to src/db for complete architectural data isolation
      - ./src/db:/app/src/db
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7432/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

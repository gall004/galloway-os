services:
  focus-board:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: focus-board
    restart: unless-stopped
    ports:
      - "7432:7432"
    env_file:
      - .env.production
    volumes:
      # Persistent data & logs survive container rebuilds
      - ./src/db:/app/src/db
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7432/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

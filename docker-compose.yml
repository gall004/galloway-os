version: "3.8"

services:
  galloway-os:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: galloway-os
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      # Persistent SQLite database on host filesystem
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

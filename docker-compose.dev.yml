version: "3.8"

services:
  backend:
    image: node:20-alpine
    container_name: galloway-os-backend-dev
    working_dir: /app
    command: npx nodemon --watch src/server --watch src/db src/server/index.js
    ports:
      - "${PORT:-7432}:7432"
    environment:
      - PORT=7432
      - NODE_ENV=development
      - DATABASE_PATH=./data/galloway-os.sqlite
      - LOG_LEVEL=debug
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - ./node_modules:/app/node_modules
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7432/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: node:20-alpine
    container_name: galloway-os-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npx vite --host 0.0.0.0 --port 7433"
    ports:
      - "${VITE_PORT:-7433}:7433"
    environment:
      - VITE_API_URL=http://localhost:7432
    volumes:
      - ./src/client:/app
      - ./src/client/node_modules:/app/node_modules
